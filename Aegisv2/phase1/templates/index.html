<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS — A New Era of Secure Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .navbar {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 5%;
        }

        .hero {
            text-align: center;
            margin-bottom: 5rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            background: linear-gradient(to bottom, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 2.5rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -20px var(--primary-glow);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        code-block {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            display: block;
            margin-top: 1rem;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        #results-area {
            margin-top: 3rem;
            display: none;
        }

        .finding-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .severity-high { color: var(--danger); font-weight: bold; }
        .severity-medium { color: var(--accent); font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AEGIS ENGINE</div>
        <div class="status-badge">● SYSTEM OPERATIONAL</div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1 class="animate-in">Autonomous Security.</h1>
            <p class="animate-in" style="animation-delay: 0.1s">AI-driven vulnerability analysis and self-healing for modern development workflows.</p>
        </div>

        <div class="dashboard-grid">
            <div class="card animate-in" style="animation-delay: 0.2s">
                <h2>🔍 Scan Project</h2>
                <form action="/scan" method="post">
                    <div class="input-group">
                        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-dim)">FOLDER PATH</label>
                        <input type="text" name="path" value="." placeholder="e.g. ./src">
                    </div>
                    <button type="submit" class="btn">Start Deep Scan</button>
                </form>
            </div>

            <div class="card animate-in" style="animation-delay: 0.3s">
                <h2>🤖 AI Healing</h2>
                <form action="/fix" method="post">
                    <div class="input-group">
                        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-dim)">CODE SNIPPET</label>
                        <textarea name="code" rows="5" placeholder="Paste vulnerable code here..."></textarea>
                    </div>
                    <button type="submit" class="btn" style="background: linear-gradient(to right, #6366f1, #a855f7)">Analyze & Fix</button>
                </form>
            </div>
        </div>

        <div id="results-area" class="card">
            <!-- Results injected here -->
        </div>
    </div>

    <script>
        // Smooth scroll and interactions
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = "Processing...";
                btn.disabled = true;

                const formData = new FormData(form);
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                
                const html = await response.text();
                const resultsArea = document.getElementById('results-area');
                resultsArea.innerHTML = html;
                resultsArea.style.display = 'block';
                resultsArea.scrollIntoView({ behavior: 'smooth' });

                btn.innerText = originalText;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
